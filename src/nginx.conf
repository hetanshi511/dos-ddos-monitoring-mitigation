user www-data;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log;
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 768;
    # multi_accept on;
}

http {
    ##
    # Basic Settings
    ##
    sendfile on;
    tcp_nopush on;
    types_hash_max_size 2048;
    server_tokens off;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    ##
    # SSL Settings
    ##
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    ##
    # Logging Settings
    ##
    log_format custom_log_format '$remote_addr - $remote_user [$time_local] "$request" '
                                 '$status $body_bytes_sent "$http_referer" "$http_user_agent" '
                                 'limit_status=$limit_req_status';
    access_log /var/log/nginx/access.log custom_log_format;

    ##
    # Gzip Settings
    ##
    gzip on;

    ##
    # Lua and Rate-Limiting Settings
    ##
    lua_shared_dict attack_dict 10m;  # Shared memory zone for Lua dictionary
    limit_req_zone $binary_remote_addr zone=per_ip_rate_limit:10m rate=10r/m;

    ##
    # Virtual Host Configs
    ##
    include /etc/nginx/conf.d/*.conf;
    include /etc/nginx/sites-enabled/*;
}
